name: Deploy Vite site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Install dependencies
        run: npm install --include=optional

      - name: Install rolldown Linux binding
        run: npm install --no-save @rolldown/binding-linux-x64-gnu@1.1.3

      - name: Install lightningcss Linux binding
        run: npm install --no-save lightningcss-linux-x64-gnu@1.32.0

      - name: Install Tailwind Oxide Linux binding
        run: npm install --no-save @tailwindcss/oxide-linux-x64-gnu@4.3.2

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
