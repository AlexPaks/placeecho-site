name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm install --include=optional

      - name: Install rolldown Linux binding
        run: npm install --no-save @rolldown/binding-linux-x64-gnu@1.1.3

      - name: Run ESLint
        run: npm run lint:check

      - name: Build app
        run: npm run build
